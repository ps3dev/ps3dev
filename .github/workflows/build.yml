name: CI

on:
  push:
  #pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-toolchain:
    name: Toolchain (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            family: ubuntu
            arch_shell: ""

          - name: ubuntu-arm64
            os: ubuntu-24.04-arm
            family: ubuntu
            arch_shell: ""

          - name: macos-intel
            os: macos-15-intel
            family: macos
            arch_shell: "arch -x86_64"

          - name: macos-arm64
            os: macos-15-arm64
            family: macos
            arch_shell: ""

    env:
      PS3DEV: ${{ github.workspace }}/ps3dev
      PS3TOOLCHAIN_REF: master

    steps:
      - uses: actions/checkout@v6

      - name: Install Ubuntu requirements
        if: matrix.family == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake bison bzip2 clang flex g++ gcc \
            libelf-dev libgmp3-dev libncurses5-dev libssl-dev \
            libtool-bin make patch pkg-config python-is-python3 \
            python3-dev subversion texinfo wget zlib1g-dev

      - name: Install macOS requirements
        if: matrix.family == 'macos'
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          HOMEBREW_NO_ENV_HINTS: 1
        run: |
          ${{ matrix.arch_shell }} brew install autoconf automake libelf ncurses texinfo zlib

      - name: Build toolchain
        shell: bash
        run: |
          ${{ matrix.arch_shell }} sh ./build-all.sh