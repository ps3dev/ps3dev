name: CI

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

permissions:
  contents: read

jobs:
  build-toolchain:
    name: Toolchain (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
    env:
      PS3DEV: ${{ github.workspace }}/ps3dev

    steps:
      - uses: actions/checkout@v6

      - name: Install Ubuntu requirements
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake bison bzip2 clang flex g++ gcc \
            libelf-dev libgmp3-dev libncurses5-dev libssl-dev \
            libtool-bin make patch pkg-config python-is-python3 \
            python3-dev subversion texinfo wget zlib1g-dev

      - name: Install macOS requirements
        if: matrix.os == 'macos-15-intel'
        shell: arch -x86_64 bash -e {0}
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          HOMEBREW_NO_ENV_HINTS: 1
        run: |
          brew install \
            autoconf automake gmp libelf ncurses openssl \
            pkg-config texinfo wget zlib

      - name: Build toolchain
        if: matrix.os == 'ubuntu-latest'
        run: sh ./build-all.sh

      - name: Build toolchain
        if: matrix.os == 'macos-15-intel'
        shell: arch -x86_64 bash -e {0}
        run: sh ./build-all.sh
